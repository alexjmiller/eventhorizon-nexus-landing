<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Horizon Nexus</title>
<meta name="description" content="Event Horizon Nexus — the boundary between what is visible and what is about to emerge.">
<link rel="canonical" href="https://eventhorizon.nexus/">
<meta property="og:title" content="Event Horizon Nexus">
<meta property="og:description" content="The boundary between what is visible and what is about to emerge.">
<meta property="og:url" content="https://eventhorizon.nexus/">
<meta property="og:image" content="https://eventhorizon.nexus/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root {
    --fg: #ffffff;
    --bg: #000000;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  canvas#field {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .overlay {
    position: fixed;
    inset: 0;
    /* per-pixel invert against the canvas: white text goes black wherever a
       white hoop passes behind it, stays white over the void */
    mix-blend-mode: difference;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    pointer-events: none;
    padding: 0 1.5rem;
  }
  h1 {
    font-weight: 100;
    font-size: clamp(1.4rem, 4.5vw, 3.2rem);
    letter-spacing: 0.45em;
    text-indent: 0.45em; /* balance the trailing letter-spacing */
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tagline {
    margin-top: 1.6rem;
    font-weight: 200;
    font-size: clamp(0.7rem, 1.6vw, 0.95rem);
    letter-spacing: 0.22em;
    text-indent: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
    max-width: 42em;
    line-height: 2;
  }
  .foot {
    position: fixed;
    mix-blend-mode: difference;
    bottom: 1.4rem;
    left: 0;
    right: 0;
    text-align: center;
    font-weight: 200;
    font-size: 0.62rem;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    text-transform: uppercase;
    opacity: 0.3;
    pointer-events: none;
  }
  /* portrait phones: the desktop tracking is wider than the screen and clips
     the first/last glyphs — tighten it and let the size follow the viewport */
  @media (max-width: 600px) {
    h1 {
      font-size: 4.6vw;
      letter-spacing: 0.26em;
      text-indent: 0.26em;
    }
    .tagline {
      letter-spacing: 0.16em;
      text-indent: 0.16em;
    }
  }
  .fade-in { animation: fadein 2.4s ease-out both; }
  .fade-in.delay { animation-delay: 0.9s; }
  @keyframes fadein {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .tagline.fade-in.delay { animation-name: fadein-dim; }
  @keyframes fadein-dim {
    from { opacity: 0; }
    to   { opacity: 0.55; }
  }
  @media (prefers-reduced-motion: reduce) {
    .fade-in { animation: none; }
  }
</style>
</head>
<body>
<canvas id="field"></canvas>
<div class="overlay">
  <h1 class="fade-in">Event Horizon Nexus</h1>
  <p class="tagline fade-in delay">The boundary between what is visible and what is about to emerge</p>
</div>
<div class="foot">eventhorizon.nexus</div>

<script>
(() => {
  const canvas = document.getElementById('field');
  const gl = canvas.getContext('webgl2', { antialias: true, alpha: false });
  if (!gl) return; // black page with title still stands on its own

  const VERT = `#version 300 es
  in vec2 aPos;
  void main() { gl_Position = vec4(aPos, 0.0, 1.0); }`;

  const FRAG = `#version 300 es
  precision highp float;
  uniform vec2  uRes;
  uniform float uTime;
  uniform vec2  uDrift;   // eased mouse offset, -1..1
  out vec4 outColor;

  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
  }

  // numerically stable atan2: the driver's atan(y, x) has precision cliffs
  // near the vertical axis on some GPUs (phantom radial lines at 12 and 6
  // o'clock). Fold into the first octant so atan only ever sees a ratio <= 1.
  float at2(vec2 p) {
    float ax = abs(p.x), ay = abs(p.y);
    float a  = atan(min(ax, ay) / max(max(ax, ay), 1e-8));
    a = (ay > ax)  ? 1.57079632679 - a : a;
    a = (p.x < 0.0) ? 3.14159265359 - a : a;
    return (p.y < 0.0) ? -a : a;
  }

  // bright line where v crosses half-integers, anti-aliased with a supplied
  // filter width (fwidth is unusable for angular coords — it spikes at the
  // atan wrap seam and paints a phantom radial line)
  float gridLine(float v, float w, float f) {
    return smoothstep(w + f, w - f, abs(fract(v) - 0.5));
  }

  // a layer of streaming dust: one particle per angular cell, each on its own
  // random birth schedule (no shared wavefront), drifting outward from the
  // horizon and reborn with fresh size/brightness/position when it dies
  float dustLayer(float r, float a, float phase, float seed, float px) {
    float N = 200.0;
    float coord = (a + uTime * 0.02) / 6.28318530718 * N;
    float cell  = floor(coord);
    float hp  = hash(vec2(cell, seed + 2.7));   // per-particle phase offset
    float cyc = uTime * 0.045 + phase + hp;
    float t   = fract(cyc);
    float k   = floor(cyc);                      // rebirth index — reseeds each life
    float rs  = seed + k * 31.7;
    float h1 = hash(vec2(cell, rs));
    float h2 = hash(vec2(cell, rs + 5.0));
    float h3 = hash(vec2(cell, rs + 9.0));
    // true perspective: constant speed along the tube axis reads on screen as
    // r = 0.3/z — barely creeping near the horizon, accelerating outward
    float pos  = 0.30 / (3.0 - 2.76 * t);
    float rDot = pos * (1.0 + (h2 - 0.5) * 0.14);          // radial scatter
    float da   = (fract(coord) - (0.15 + 0.7 * h1)) / N * 6.28318530718;
    float d    = length(vec2(r - rDot, da * r));           // local distance to the particle
    float size = px * (1.2 + 2.0 * h3);
    float dotb = smoothstep(size, 0.0, d);
    float twinkle = 0.7 + 0.3 * sin(uTime * (3.0 + 5.0 * h2) + h1 * 40.0);
    // half the particles burn out mid-flight, half stay lit all the way off
    // the screen edge (their cycle ends at r=1.25, safely outside the frame)
    float h4 = hash(vec2(cell, rs + 13.0));
    float fade = h4 < 0.5 ? 1.0 - smoothstep(0.35, 0.85, t) : 1.0;
    float life = smoothstep(0.0, 0.08, t) * fade;
    return dotb * (0.25 + 0.75 * h3) * twinkle * life * 0.9;
  }

  void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * uRes) / uRes.y;
    uv += uDrift * 0.03;
    float px = 1.5 / uRes.y;

    // bend the tube: the far end swings toward the pointer. The centre offset
    // must be solved self-consistently (depth is measured from the displaced
    // centre, which itself depends on depth) — a one-shot displacement warps
    // space like a lens instead of bending the tunnel.
    // the offset profile must have bounded slope (|swing| * max|w'| < 1) or
    // the mapping folds over and mirror-duplicates the deep tunnel at large
    // deflections — hence smoothstep falloff rather than 1/r depth
    vec2 swing = vec2(uDrift.x, uDrift.y * 0.4) * 0.26;
    vec2 c0 = vec2(0.0);
    for (int i = 0; i < 4; i++) {
      float rr = length(uv - c0);
      c0 = swing * (1.0 - smoothstep(0.0, 0.62, rr));
    }
    uv -= c0;

    float r = length(uv);
    float a = at2(uv);

    // tunnel projection: depth grows toward the centre
    float z     = 0.30 / (r + 1e-3);
    float depth = z + uTime * 0.45;          // forward motion into the horizon
    float roll  = 0.06 * sin(uTime * 0.05);  // barely-there camera roll
    float spin  = uTime * 0.035;             // slow steady rotation of the world-lines
    float ang   = (a + roll + spin) / 6.28318530718;

    // spacetime lattice: rings are slices of time, spokes are world-lines
    float spokeCoord = ang * 24.0 + depth * 0.018;
    float fSpoke = (24.0 / 6.28318530718) * px / max(r, 1e-3); // analytic width, seam-free
    float rings  = gridLine(depth, 0.0035, fwidth(depth));
    float spokes = gridLine(spokeCoord, 0.015, fSpoke);
    float lattice = max(rings, spokes * 0.75);

    // fade with distance, and swallow everything near the horizon itself
    float fog  = exp(-z * 0.115);
    float hole = smoothstep(0.012, 0.145, r);
    float vig  = 1.0 - 0.45 * smoothstep(0.55, 1.15, r);

    float c = lattice * fog * hole * vig;

    // a thin luminous rim where the lattice meets the dark
    // (disabled for a cleaner look — restore by uncommenting)
    // c += 0.20 * exp(-abs(r - 0.105) * 55.0);

    // continuous stream of space dust flowing out of the horizon — several
    // independent layers, every particle on its own schedule. Dust floats
    // inside the tube, so it gets 50% extra swing: visible parallax against
    // the walls when the pointer bends the tunnel.
    vec2 uvD  = uv - c0 * 0.5;
    float rD  = length(uvD);
    float aD  = at2(uvD);
    float holeD = smoothstep(0.012, 0.145, rD);
    for (int i = 0; i < 5; i++) {
      c += dustLayer(rD, aD, float(i) * 0.2, 3.0 + float(i) * 7.3, px) * holeD;
    }

    // subtle grain to kill banding
    c += (hash(gl_FragCoord.xy + fract(uTime)) - 0.5) * 0.035;

    c = clamp(c, 0.0, 1.0);
    outColor = vec4(vec3(c), 1.0);
  }`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  // full-screen triangle
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uRes   = gl.getUniformLocation(prog, 'uRes');
  const uTime  = gl.getUniformLocation(prog, 'uTime');
  const uDrift = gl.getUniformLocation(prog, 'uDrift');

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.round(innerWidth * dpr);
    canvas.height = Math.round(innerHeight * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  addEventListener('resize', resize);
  resize();

  // eased pointer parallax
  let mx = 0, my = 0, dx = 0, dy = 0;
  addEventListener('pointermove', e => {
    mx = (e.clientX / innerWidth)  * 2 - 1;
    my = (e.clientY / innerHeight) * 2 - 1;
  });

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const start = performance.now();

  function frame(now) {
    const t = (now - start) / 1000;
    dx += (mx - dx) * 0.04;
    dy += (my - dy) * 0.04;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, reduced ? 0 : t);
    gl.uniform2f(uDrift, dx, -dy);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    if (!reduced) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
